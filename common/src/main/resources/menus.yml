# Below you can edit the names, lores, and usage messages in the '/tweaks' menu.
# The ordering in this file does not matter (it gets reordered automatically).
tweak-menu:
  name: "&8Tweaks (&2{count}&8)"
  categories:
    mobs:
      type: ZOMBIE_HEAD
      name: "&cMob Tweaks &8(&2{count}&8)"
      lore: "&7All tweaks related to Mobs."
    blocks:
      type: GRASS_BLOCK
      name: "&bBlock Tweaks &8(&2{count}&8)"
      lore: "&7All tweaks related to Blocks."
    crops:
      type: WHEAT
      name: "&aCrop Tweaks &8(&2{count}&8)"
      lore: "&7All tweaks related to Crops."
    text:
      type: BOOK
      name: "&9Text Tweaks &8(&2{count}&8)"
      lore: "&7All tweaks related to displaying Text."
    convenience:
      type: CLOCK
      name: "&eConvenience Tweaks &8(&2{count}&8)"
      lore: "&7All tweaks that save you time & effort."
    recipes:
      type: CRAFTING_TABLE
      name: "&5Recipe Tweaks &8(&2{count}&8)"
      lore: "&7All tweaks that add Recipes to the game."
    miscellaneous:
      type: BEDROCK
      name: "&3Miscellaneous Tweaks &8(&2{count}&8)"
      lore: "&7Tweaks that do not belong to any other category."
  tweaks:
    anvil-color:
      type: ANVIL
      name: "&aColored Names"
      lore:
        - "&7Items can be colored in the anvil."
        - ""
        - "&8Minecraft Colors:"
        - "&00&11&22&33&44&55&66&77&88&99&aa&bb&cc&dd&ee&ff"
        - "&fk &7→ &k12345  &fl &7→ &lBold"
        - "&fm &7→ &mStrike&r  &fn &7→ &nUline"
        - "&fo &7→ &oItalic&r   &fr &7→ Reset"
      usage: "&eUsage: &aPlace an item in an Anvil with the listed color codes."
    anvil-repair:
      type: DAMAGED_ANVIL
      name: "&aAnvil Repair &8(Right Click)"
      lore:
        - "&7Repair an Anvil by 1 level."
        - ""
        - "&8Requires:"
        - " &7Iron Block &8(Default)"
      usage: "&eUsage: &aRight Click an Anvil with an Iron Block to repair it."
    armor-stand-arms:
      type: ARMOR_STAND
      name: "&aArmor Stand Arms &8(Spawn)"
      lore: "&7Armor Stands spawn with arms."
      usage: "&eUsage: &aSpawn an Armor Stand to give it arms."
    armor-swap:
      type: CHAINMAIL_CHESTPLATE
      name: "&aArmor Swap &8(Sneak)"
      lore: "&7Armor Stands can quick swap Armor."
      usage: "&eUsage: &aSneak over an Armor Stand to quick swap Armor."
    bee-capture:
      type: BEE_SPAWN_EGG
      name: "&aBee Capture &8(Right Click)"
      lore:
        - "&7Click on Bees to capture them."
        - ""
        - "&8Requires (1):"
        - " &7Bee Nest"
        - " &7Beehive"
      usage: "&eUsage: &aRight Click a Bee with a Bee Nest to capture it."
    break-bedrock:
      type: BEDROCK
      name: "&aBedrock Break"
      lore:
        - "&7Bedrock can now be broken. No drops."
        - ""
        - "&8Requires:"
        - " &7Netherite Pick, Eff 5, Haste II."
      usage: "&eUsage: &aBreak Bedrock with a Netherite Pickaxe, Efficiency V, and Haste II."
    break-deepslate:
      type: DEEPSLATE
      name: "&aDeepslate Break"
      lore:
        - "&7Instantly break Deepslate."
        - ""
        - "&8Requires:"
        - " &7Netherite Pick, Eff 5, Haste II."
      usage: "&eUsage: &aBreak Deepslate instantly with a Netherite Pickaxe, Efficiency V, and Haste II."
    # Only shows the one you have active in the config.yml file.
    break-ender-chest:
      drop:
        type: ENDER_CHEST
        name: "&aEnder Chest Break"
        lore: "&7Always drops, even without Silk Touch."
        usage: "&eUsage: &aEnder Chests always drop when broken."
      protection:
        type: ENDER_CHEST
        name: "&aEnder Chest Break"
        lore: "&7Cannot be broken without Silk Touch."
        usage: "&eUsage: &aEnder Chests cannot be broken without Silk Touch."
    break-glass:
      type: TINTED_GLASS
      name: "&aGlass Break"
      lore:
        - "&7Instantly break Glass."
        - ""
        - "&8Requires:"
        - " &7Netherite Pickaxe"
      usage: "&eUsage: &aBreak Glass instantly with the listed tools."
    break-leaves:
      type: MANGROVE_LEAVES
      name: "&aLeaves Break"
      lore:
        - "&7Breaks an extra block on each side."
        - ""
        - "&8Requires:"
        - " &7Hoe &8(Default)"
        - " &7Netherite Hoe &8(3x3x3)"
      usage: "&eUsage: &aBreaking Leaves with a Hoe will break an extra block on each side. Netherite Hoes → 3x3x3."
    break-plants:
      type: TALL_GRASS
      name: "&aPlants Break"
      lore:
        - "&7Breaks a radius of plants."
        - ""
        - "&8Requires:"
        - " &7Hoe &8(3x3)"
        - " &7Netherite Hoe &8(5x5)"
      usage:
        - "&eUsage: &aBreak Plants with a Hoe to 3x3 break them."
        - "         &aUsing a Netherite Hoe → 5x5 break."
    breeding-indicator:
      type: COW_SPAWN_EGG
      name: "&aBreeding Indicator"
      lore: "&7Shows when Mobs can breed again."
      usage: "&eUsage: &aAdds an indicator above Mobs to show when they can breed again."
    cauldron-concrete:
      type: WHITE_CONCRETE
      name: "&aCauldron Concrete &8(Throw)"
      lore: "&7Turn Concrete Powder into Concrete."
      usage: "&eUsage: &aThrow Concrete Powder into a Cauldron for Concrete."
    cauldron-mud:
      type: MUD
      name: "&aCauldron Mud &8(Throw)"
      lore: "&7Turn Dirt into Mud."
      usage: "&eUsage: &aThrow Dirt into a Cauldron for Mud."
    coordinates:
      type: PLAYER_HEAD
      name: "&aCoordinates &8(Command)"
      lore: "&7Toggle your coordinates."
      usage: "&eUsage: &aType &e/coords &ato toggle your coordinates."
    crops-bone-meal:
      type: NETHER_WART
      name: "&aBone Meal Anything"
      lore: "&7Can be used on any Crop."
      usage: "&eUsage: &aUse Bone Meal on any Crop to make it grow."
    crops-harvest:
      type: NETHERITE_HOE
      name: "&aHarvest Crops &8(Right Click)"
      lore:
        - "&7Instantly harvest Crops."
        - ""
        - "&8Requires:"
        - " &7Hoe &8(Any)"
      usage: "&eUsage: &aRight Click a Crop with a Hoe to instantly harvest & replant."
    crops-protection:
      type: WHEAT
      name: "&aCrop Protection"
      lore: "&7Prevents the trampling of Crops."
      usage: "&eUsage: &aPrevents the trampling of Crops when jumped on."
    death-notify:
      type: SKELETON_SKULL
      name: "&aDeath Notify &8(Die)"
      lore: "&7Notifies where you died."
      usage: "&eUsage: &aNotifies you of your death location."
    doors-double:
      type: SPRUCE_DOOR
      name: "&aDouble Doors"
      lore: "&7Open connected Doors with 1 click."
      usage: "&eUsage: &aAllows the opening of connected Doors with 1 click."
    doors-iron:
      type: IRON_DOOR
      name: "&aIron Doors &8(Right Click)"
      lore: "&7Open Iron Doors with your hands."
      usage: "&eUsage: &aAllows the opening of Iron Doors."
    drops-filter:
      type: CAULDRON
      name: "&aDrop Filter &8(Right Click)"
      lore: "&7Open your Drop Filter."
      usage:
        - "&eUsage: &aRight Click a Cauldron to open up your Drop Filter."
        - "         &aType &e/filter &aor &e/drops &ato easily toggle it on or off."
    drops-player-head:
      type: PLAYER_HEAD
      name: "&aPlayer Head Drop"
      lore: "&7Killing another Player has a &e{chance}% &7chance to drop their head."
      usage: "&eUsage: &aIf you kill a player, there is a &e{chance}% &achance that their head will drop."
    drops-magnet:
      type: FLINT
      name: "&aDrops Magnet &8(Break)"
      lore: "&7Broken blocks get boosted towards you."
      usage: "&eUsage: &aBreaking blocks will cause their item drops to get boosted towards you."
    durability-indicator:
      type: ELYTRA
      name: "&aDurability Indicator &8(Damage)"
      lore:
        - "&7Warns you when your items are about to break."
      usage: "&eUsage: &aWhen your important items are about to break, a warning will be sent to you."
    enchanting-lapis:
      type: LAPIS_LAZULI
      name: "&aLapis Store"
      lore: "&7Permanently store Lapis in Enchanting Tables."
      usage: "&eUsage: &aLapis stays in the Lapis slot in Enchanting Tables when you close it."
    entity-dye:
      type: RED_DYE
      name: "&aDye Mobs &8(Right Click)"
      lore: "&7Change the color of named Mobs."
      usage: "&eUsage: &aRight Click on a Mob with a Dye to change its name color."
    entity-equip:
      type: STONE_SWORD
      name: "&aEquip Mobs &8(Throw)"
      lore: "&7Mobs will auto equip thrown items."
      usage: "&eUsage: &aThrowing items close to a Mob will cause them to auto equip it."
    entity-ignite:
      type: FLINT_AND_STEEL
      name: "&aIgnite Mobs &8(Right Click)"
      lore:
        - "&7Set any Mob on fire."
        - ""
        - "&8Requires (1):"
        - " &7Flint & Steel"
        - " &7Fire Charge"
      usage: "&eUsage: &aRight Click a Mob with a Flint & Steel or Fire Charge to set it on fire."
    entity-silence:
      type: NAME_TAG
      name: "&aSilence Mobs"
      lore:
        - "&7Name a Mob \"&esilence&7\" to make it silent."
        - "&7Name a Mob \"&eunsilence&7\" to make it audible."
      usage: "&eUsage: &aName a Mob \"silence\" or \"unsilence\" to toggle its sound."
    food-glow-berries:
      type: GLOW_BERRIES
      name: "&aGlow Berries Glow &8(Eat)"
      lore: "&7Eat Glow Berries to Glow!"
      usage: "&eUsage: &aEating Glow Berries will give you the glow effect."
    fortune-silk-swap:
      type: NETHERITE_PICKAXE
      name: "&aFortune Silk Swap &8(Right Click)"
      lore:
        - "&7Add Fortune and Silk Touch to the same tool."
        - "&7Grants you the ability to toggle between modes."
        - ""
        - "&8Requires:"
        - " &7Pickaxe &8(Any)"
        - " &7Axe &8(Any)"
        - " &7Shovel &8(Any)"
        - " &7Hoe &8(Any)"
      usage:
        - "&eUsage: &aAdd Fortune and Silk Touch to the same tool."
        - "         &aOnce added, right-click to toggle between enchants."
    happy-ghast-placement:
      type: HAPPY_GHAST_SPAWN_EGG
      name: "&aPlace Blocks on Happy Ghasts"
      lore: "&7Blocks can be placed on top of their heads."
      usage: "&eUsage: &aBlocks can be placed on top of Happy Ghast's heads."
    happy-ghast-speed:
      type: HAPPY_GHAST_SPAWN_EGG
      name: "&aIncreased Speed of Happy Ghasts"
      lore: "&7Speed Multiplier: &e{speed}x"
      usage: "&eUsage: &aIncreases the speed of Happy Ghasts by &e{speed}x&a."
    hay-bale-bread:
      type: BREAD
      name: "&aHarvest Hay Bale &8(Right Click)"
      lore:
        - "&7Automatically crafts & drops bread."
        - ""
        - "&8Requires:"
        - " &7Hoe &8(Any)"
      usage: "&eUsage: &aRight Click a Hay Bale with a Hoe to automatically craft and drop Bread."
    horse-randomizer:
      type: HORSE_SPAWN_EGG
      name: "&aHorse Randomizer &8(Right Click)"
      lore:
        - "&7Randomize the color and style of a Horse."
        - ""
        - "&8Requires:"
        - " &7Brush"
      usage: "&eUsage: &aRandomize an untamed Horse's color and style by right-clicking it with a Brush."
    horse-statistics:
      type: HORSE_SPAWN_EGG
      name: "&aHorse Statistics &8(Sneak Right Click)"
      lore: "&7View the statistics of Horses."
      usage: "&eUsage: &aView the statistics (health-speed-jump) of Horses by sneak-right-click."
    inventory-crafting:
      type: CRAFTING_TABLE
      name: "&aInventory Crafting &8(Right Click)"
      lore: "&7Open up a Crafting Table in your inventory."
      usage: "&eUsage: &aRight Click a Crafting Table in your inventory to open it."
    inventory-ender-chest:
      type: ENDER_CHEST
      name: "&aInventory Ender Chest &8(Right Click)"
      lore: "&7Add Silk Touch to your Ender Chest to open it."
      usage:
        - "&eUsage: &aAllows you to add Silk Touch to your Ender Chest."
        - "         &aOnce added, right-click it in your inventory to open it."
    item-frame-click-through:
      type: ITEM_FRAME
      name: "&aClick Through Item Frames &8(Right Click)"
      lore: "&7Open Chests with Item Frames on them."
      usage:
        - "&eUsage: &aRight Click an Item Frame on a Chest to open it."
        - "         &aShift for normal behavior."
    item-frame-invisible:
      type: ITEM_FRAME
      name: "&aToggle Item Frames &8(Sneak Right Click)"
      lore:
        - "&7Toggle the visibility of Item Frames."
        - ""
        - "&8Requires:"
        - " &7Shears &8(Default)"
      usage: "&eUsage: &aSneak Right Click an Item Frame with Shears to toggle its visibility."
    keep-inventory:
      type: BUNDLE
      name: "&aKeep Inventory &8(Death)"
      # Only shows the ones you have active in the config.yml file.
      lore:
        xp: "&a► &7Keep your &eXP &7on death."
        armor: "&a► &7Keep your &eArmor &7on death."
        tools: "&a► &7Keep your &eTools &7on death."
        stackables: "&a► &7Keep &e{percent}% &7of stackables on death."
        unstackables: "&a► &7&e{chance}% &7chance to keep unstackables on death."
      usage: "&eUsage: &aPartially keep your inventory on death."
    ladder-placement:
      type: LADDER
      name: "&aLadder Placement &8(Right Click)"
      lore:
        - "&7Click on an existing Ladder to expand it."
        - ""
        - "&8Requires:"
        - " &7Ladder &8(Default)"
      usage: "&eUsage: &aPlace Ladders up or down depending on your direction by right-clicking existing Ladders."
    # Only shows the one you have active in the config.yml file.
    ladder-teleportation:
      automatic:
        type: LADDER
        name: "&aLadder Teleportation"
        lore: "&7Walk into a Ladder to teleport."
        usage: "&eUsage: &aTeleport up or down by walking into a Ladder."
      manual:
        type: LADDER
        name: "&aLadder Teleportation &8(Look Up or Down)"
        lore: "&7Look straight up or down to teleport."
        usage: "&eUsage: &aTeleport by looking straight up or down while walking into a Ladder."
      click:
        type: LADDER
        name: "&aLadder Teleportation &8(Right Click)"
        lore: "&7Click on a Ladder to teleport."
        usage: "&eUsage: &aTeleport by right-clicking on a Ladder while looking slightly up or down."
    night-vision:
      type: NIGHT_VISION
      name: "&aNight Vision &8(Command)"
      lore: "&7Toggle Night Vision."
      usage: "&eUsage: &aType &e/nightvision &ato toggle Night Vision."
    path-speed:
      type: DIRT_PATH
      name: "&aPath Speed &8(Move)"
      lore: "&7Moving on Paths increases your Speed by &e{multiplier}x&7."
      usage: "&eUsage: &aWhenever you are on Dirt Paths, your speed is increased by &e{multiplier}x&a."
    pet-protection:
      type: WOLF_SPAWN_EGG
      name: "&aPet Protection"
      lore: "&7Protects your Pets from yourself."
      usage: "&eUsage: &aPrevents you from attacking your own Pet."
    player-feed:
      type: COOKED_BEEF
      name: "&aPlayer Feeding &8(Right Click)"
      lore: "&7Feed Food to Players"
      usage: "&eUsage: &aRight Click on a Player with food to feed them."
    portal-protection:
      type: OBSIDIAN
      name: "&aPortal Protection"
      lore: "&7Protects Nether Portals from explosions."
      usage: "&eUsage: &aNether Portals can no longer be destroyed by explosions."
    recipe-black-dye:
      type: BLACK_DYE
      name: "&aBlack Dye &8(Craft)"
      lore: "&7Craft Black Dye from Coal / Charcoal."
    recipe-chests:
      type: CHEST
      name: "&aChests &8(Craft)"
      lore: "&7Craft Chests from Logs."
    recipe-cobweb:
      type: COBWEB
      name: "&aCobweb &8(Craft)"
      lore: "&7Craft Cobwebs from String."
    recipe-dirt-path:
      type: DIRT_PATH
      name: "&aDirt Path &8(Craft)"
      lore: "&7Craft Dirt Paths from Dirt."
    recipe-god-apple:
      type: ENCHANTED_GOLDEN_APPLE
      name: "&aGod Apple &8(Craft)"
      lore: "&7Craft OG God Apple."
    recipe-golden-carrot:
      type: GOLDEN_CARROT
      name: "&aGolden Carrot &8(Craft)"
      lore: "&7Craft Golden Carrot from Gold Ingot."
    recipe-golden-melon:
      type: GLISTERING_MELON_SLICE
      name: "&aGlistering Melon &8(Craft)"
      lore: "&7Craft Glistering Melon from Gold Ingot."
    recipe-grass-block:
      type: GRASS_BLOCK
      name: "&aGrass Block &8(Craft)"
      lore: "&7Craft Grass Blocks from Dirt + Bone Meal."
    recipe-hopper:
      type: HOPPER
      name: "&aHopper &8(Craft)"
      lore: "&7Craft Hopper using Logs."
    recipe-leather:
      type: LEATHER
      name: "&aLeather &8(Smelt)"
      lore: "&7Smelt Rotten Flesh into Leather."
    recipe-redstone-comparator:
      type: COMPARATOR
      name: "&aRedstone Comparator &8(Craft)"
      lore: "&7Craft Comparators from Repeaters + Quartz."
    recipe-redstone-repeater:
      type: REPEATER
      name: "&aRedstone Repeater &8(Craft)"
      lore: "&7Craft Repeaters from Comparators."
    recipe-splash-water-bottles:
      type: SPLASH_POTION
      name: "&aSplash Water Bottles &8(Craft)"
      lore: "&7Craft Water Bottles from Water Bucket."
    recipe-sticks:
      type: STICK
      name: "&aSticks &8(Craft)"
      lore: "&7Craft Sticks using Logs."
    recipe-unlock-all:
      type: CRAFTING_TABLE
      name: "&aUnlock All Recipes"
      lore: "&7All recipes are unlocked."
      usage: "&eUsage: &aAutomatically unlock all recipes."
    recipe-unpack-bookshelf:
      type: BOOKSHELF
      name: "&aUnpack Bookshelves &8(Craft)"
      lore: "&7Unpack Bookshelves into Books"
    recipe-unpack-book:
      type: BOOK
      name: "&aUnpack Books &8(Craft)"
      lore: "&7Unpack Books into Paper"
    recipe-unpack-cobweb:
      type: COBWEB
      name: "&aUnpack Cobweb &8(Craft)"
      lore: "&7Unpack Cobwebs into String"
    recipe-unpack-quartz:
      type: QUARTZ_BLOCK
      name: "&aUnpack Quartz Block &8(Craft)"
      lore: "&7Unpack Quartz Blocks into Quartz"
    recipe-unpack-wool:
      type: WHITE_WOOL
      name: "&aUnpack Wool &8(Craft)"
      lore: "&7Unpack Wool into String"
    revert-farmland:
      type: FARMLAND
      name: "&aRevert Farmland &8(Sneak Right Click)"
      lore:
        - "&7Goes back to Dirt."
        - ""
        - "&8Requires:"
        - " &7Hoe &8(Any)"
      usage: "&eUsage: &aSneak Right Click on Farmland with a Hoe to revert it back to Dirt."
    revert-path:
      type: DIRT_PATH
      name: "&aRevert Path &8(Sneak Right Click)"
      lore:
        - "&7Goes back to Dirt."
        - ""
        - "&8Requires:"
        - " &7Shovel &8(Any)"
      usage: "&eUsage: &aSneak Right Click on Dirt Paths with a Shovel to revert it back to Dirt."
    revert-stripped:
      type: STRIPPED_OAK_LOG
      name: "&aRevert Stripped &8(Sneak Right Click)"
      lore:
        - "&7Goes back to previous Log or Stem variant."
